name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Test (Java 11)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Build, test and install (bom, runtime, core, plugin)
        run: mvn clean install -Dgpg.skip=true -B

      - name: Build and test the example (regenerates via the installed plugin)
        run: mvn -f nomos-example/pom.xml clean test -B

      - name: Coverage report (nomos-core)
        if: always()
        run: mvn -pl nomos-core scoverage:report -Dgpg.skip=true -B

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-nomos-core
          path: nomos-core/target/cobertura.xml

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: nomos-core/target/cobertura.xml
          format: markdown
          output: both
          badge: true
          fail_below_min: false
          hide_complexity: true
          thresholds: "60 80"

      - name: Prepend header to coverage report
        if: github.event_name == 'pull_request'
        run: |
          sed -i '1s/^/## Code Coverage — nomos-core\n\n/' code-coverage-results.md

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-nomos-core
          path: code-coverage-results.md
