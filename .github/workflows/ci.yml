name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17]
    name: Build & Test (Java ${{ matrix.java }})

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Check Scala formatting (scalafmt)
        run: mvn -B validate -Dgpg.skip=true

      - name: Build, test and install (bom, runtime, core, plugin)
        run: mvn clean install -Dgpg.skip=true -B

      - name: Verify release artifacts (sources/javadoc jars, plugin descriptor)
        run: |
          set -euo pipefail
          for m in nomos-runtime nomos-core nomos-maven-plugin; do
            ls "$m"/target/"$m"-*-sources.jar
            ls "$m"/target/"$m"-*-javadoc.jar
          done
          plugin_jar=$(ls nomos-maven-plugin/target/nomos-maven-plugin-*.jar | grep -Ev 'sources|javadoc')
          jar tf "$plugin_jar" | grep -q '^META-INF/maven/plugin.xml$'
          echo "Release artifacts present: sources + javadoc jars for each module and the plugin descriptor."

      - name: Build and test the example (regenerates via the installed plugin)
        run: mvn -f nomos-example/pom.xml clean test -B

      - name: Check generated API documentation
        if: matrix.java == 11
        run: |
          dev/scripts/build-api-docs.sh
          git diff --exit-code -- docs/api docs/runtime-api
          test -z "$(git status --porcelain --untracked-files=all -- docs/api docs/runtime-api)"

      - name: Coverage reports
        if: always() && matrix.java == 11
        run: mvn -pl nomos-runtime,nomos-core scoverage:report -Dgpg.skip=true -B

      - name: Enforce coverage floors
        if: matrix.java == 11
        run: mvn -pl nomos-runtime,nomos-core scoverage:check -Dgpg.skip=true -B

      - name: Upload coverage report
        if: always() && matrix.java == 11
        uses: actions/upload-artifact@v7
        with:
          name: coverage-nomos-core
          path: |
            nomos-runtime/target/cobertura.xml
            nomos-core/target/cobertura.xml

      - name: Post coverage to PR
        if: github.event_name == 'pull_request' && matrix.java == 11
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: nomos-runtime/target/cobertura.xml,nomos-core/target/cobertura.xml
          format: markdown
          output: both
          badge: true
          fail_below_min: false
          hide_complexity: true
          thresholds: "90 95"

      - name: Prepend header to coverage report
        if: github.event_name == 'pull_request' && matrix.java == 11
        run: |
          sed -i '1s/^/## Code Coverage — nomos-runtime + nomos-core\n\n/' code-coverage-results.md

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request' && matrix.java == 11
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-nomos-core
          path: code-coverage-results.md
